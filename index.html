<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قیمت ضایعات</title>
<style>
body{
font-family:tahoma;
background:#f4f4f4;
padding:20px;
}
h1{
text-align:center;
color:#0a7d3b;
}
.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
font-size:20px;
}
.price{
float:left;
color:#e53935;
font-weight:bold;
}
.update{
text-align:center;
margin-top:20px;
color:#666;
}
</style>
</head>
<body>

<h1>♻️ قیمت روز ضایعات</h1>

<div class="card">پت <span class="price">13,500 تومان</span></div>
<div class="card">کارتن <span class="price">5,200 تومان</span></div>
<div class="card">آهن <span class="price">12,800 تومان</span></div>
<div class="card">آلومینیوم <span class="price">95,000 تومان</span></div>
<div class="card">مس <span class="price">680,000 تومان</span></div>

<div class="update">
آخرین بروزرسانی: امروز
</div>

</body>
</html>
